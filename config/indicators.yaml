# RADET Dashboard Indicators Configuration
# Column names match sheetHeaders.yaml positional mappings.
# All indicators are cumulative totals for Active patients (no date restriction).

indicators:

  - name: UNSUPRESSED_VL
    description: "Active patients with unsuppressed viral load (VL > 1000) - cumulative"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCurrentViralLoad
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: UNSUPRESSED_STARTED_EAC
    description: "Active unsuppressed patients (VL > 1000) who started EAC - cumulative"
    source: CombinedRADET
    periodColumn: DateOfCommencementOfEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCommencementOfEAC
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: DateOfCommencementOfEAC
        operator: isNotNull
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: UNSUPRESSED_STARTED_EAC1
    description: "Active unsuppressed patients who completed EAC session 1"
    source: CombinedRADET
    periodColumn: DateOfCommencementOfEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCommencementOfEAC
      - NumberOfEACSessionsCompleted
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: NumberOfEACSessionsCompleted
        operator: equals
        value: 1
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: UNSUPRESSED_STARTED_EAC2
    description: "Active unsuppressed patients who completed exactly EAC session 2"
    source: CombinedRADET
    periodColumn: DateOfCommencementOfEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCommencementOfEAC
      - NumberOfEACSessionsCompleted
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: NumberOfEACSessionsCompleted
        operator: equals
        value: 2
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: UNSUPRESSED_STARTED_EAC3
    description: "Active unsuppressed patients who completed exactly EAC session 3"
    source: CombinedRADET
    periodColumn: DateOfCommencementOfEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCommencementOfEAC
      - NumberOfEACSessionsCompleted
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: NumberOfEACSessionsCompleted
        operator: equals
        value: 3
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: UNSUPRESSED_EAC_COMPLETED
    description: "Active unsuppressed patients who completed full EAC course (>= 3 sessions)"
    source: CombinedRADET
    periodColumn: DateOfCommencementOfEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCommencementOfEAC
      - NumberOfEACSessionsCompleted
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: NumberOfEACSessionsCompleted
        operator: greaterThanOrEqual
        value: 3
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: POST_EAC_VIRAL_RESULT
    description: "Active unsuppressed patients who completed EAC (>=3 sessions) and have a repeat VL result recorded post-EAC"
    source: CombinedRADET
    periodColumn: DateOfRepeatVLResultPostEAC
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfRepeatVLResultPostEAC
      - RepeatVLResultPostEAC
      - NumberOfEACSessionsCompleted
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentViralLoad
        operator: greaterThan
        value: 1000
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: NumberOfEACSessionsCompleted
        operator: greaterThanOrEqual
        value: 3
      - column: RepeatVLResultPostEAC
        operator: isNotNull
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TX_CURR
    description: "Number of adults and children currently receiving antiretroviral therapy (ART)"
    source: CombinedRADET
    periodColumn: LastPickupDate
    requiredColumns:
      - CurrentARTStatus
      - LastPickupDate
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex
