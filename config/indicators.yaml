# RADET Dashboard Indicators Configuration
# Column names match sheetHeaders.yaml positional mappings.

indicators:

  - name: HTS_TST_POS
    description: "Number of individuals who tested HIV positive"
    source: CombinedHTS
    periodColumn: DateOfHIVTesting
    requiredColumns:
      - FinalHIVTestResult
      - DateOfHIVTesting
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: FinalHIVTestResult
        operator: equals
        value: "Positive"
      - column: DateOfHIVTesting
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: HTS_TST
    description: "Number of individuals who are tested for HIV"
    source: CombinedHTS
    periodColumn: DateOfHIVTesting
    requiredColumns:
      - FinalHIVTestResult
      - DateOfHIVTesting
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: DateOfHIVTesting
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

