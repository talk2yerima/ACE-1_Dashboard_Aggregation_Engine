  - name: Total_AHD_Clients
    description: "Active ART patients with AHD: CD4<200, new ART this FY, WHO stage 3/4, age<5, pregnant, or TB positive"
    source: Sheet1
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastCD4Count
      - ARTStartDate
      - ClinicalStagingAtLastVisit
      - PregnancyStatus
      - TBDiagnosticResult
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
        caseSensitive: false
    anyOf:
      - column: LastCD4Count
        operator: lessThan
        value: 200
      - column: ARTStartDate
        operator: dateinRange
        value: CurrentFY
      - column: ClinicalStagingAtLastVisit
        operator: inList
        value:
          - "3"
          - "Stage 3"
          - "Stage III"
          - "WHO Stage 3"
          - "WHO Stage III"
          - "4"
          - "Stage 4"
          - "Stage IV"
          - "WHO Stage 4"
          - "WHO Stage IV"
        caseSensitive: false
      - column: Age
        operator: lessThan
        value: 5
      - column: PregnancyStatus
        operator: equals
        value: "Pregnant"
        caseSensitive: false
