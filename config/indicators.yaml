        operator: equals
        value: "Positive"
        caseSensitive: false
      - column: TBDiagnosticResult
        operator: contains
        value: "MTB detected"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

