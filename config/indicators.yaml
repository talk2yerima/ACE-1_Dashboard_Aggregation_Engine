  # ── Unsuppressed VL + EAC cascade (shedrackfelix) ───────────────────────

  - name: Unsuppressed_VL
    description: "Active patients with unsuppressed viral load (VL >= 1000 copies/ml)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentViralLoad
      - CurrentARTStatus
      - DateOfCurrentViralLoad
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: CurrentViralLoad
        operator: isNotNull
      - column: CurrentViralLoad
        operator: greaterThanOrEqual
        value: 1000
    groupBy:
      - Facility
