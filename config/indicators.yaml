# Formula-based indicators (calculated from other indicators)
formulaIndicators:

  - name: LINKAGE_RATE
    description: "Proportion of HTS positive who were linked to ART"
    numerator: TX_New
    denominator: HTS_TST_POS
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: TX_New_TPT_Gap
    description: "New ART TB-negative patients who have not yet started TPT"
    numerator: TX_New_TB_Negative
    denominator: TX_New_Started_TPT
    formula: "numerator - denominator"
    outputType: count
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: TB_TX_GAP
    description: "Gap between TB positive results returned and treatment started"
    numerator: TB_Results_Returned
    denominator: TB_TX_Started
    formula: "numerator - denominator"
    outputType: count
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: Suppression_Rate
    description: "Proportion of patients with VL results who are virally suppressed (< 1000 copies/mL)"
    numerator: PVLSN
    denominator: VL Result Received_PVLSD
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: VL_Coverage
    description: "Proportion of eligible patients who received a viral load sample collection"
    numerator: VL_Sample_Collected
    denominator: Eligible_For_VLSC
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State
  - name: TPT_initiated_clients_already_on_treatment
    description: "TPT initiated — clients already on treatment"
    source: Sheet1
    periodColumn: DateOfTPTStart
    requiredColumns:
      - CurrentARTStatus
      - DateOfTPTStart
      - Facility
      - DATIMCode
      - State
      - Sex
      - Age
    filters:
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Active"
          - "Active Restart"
        caseSensitive: false
      - column: DateOfTPTStart
        operator: dateinRange
        value: CurrentFY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TPT_initiated_clients_newly_on_treatment
    description: "TPT initiated — clients newly on treatment"
    source: Sheet1
    periodColumn: DateOfTPTStart
    requiredColumns:
      - CurrentARTStatus
      - ARTStartDate
      - CareEntryPoint
      - DateOfTPTStart
      - Facility
      - DATIMCode
      - State
      - Sex
      - Age
    filters:
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Active"
          - "Active Restart"
        caseSensitive: false
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: ARTStartDate
        operator: dateinRange
        value: CurrentFY
      - column: DateOfTPTStart
        operator: dateinRange
        value: CurrentFY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex