  - name: IIT_by_lt3months_refill
    description: "IIT by months of refill less than 3 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastPickupDate
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

