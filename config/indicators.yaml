      - State
    filters:
      - column: DateOfTBResultReturn
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_TX_STARTED
    description: "TB patients who started treatment"
    source: Sheet1
    periodColumn: TBTreatmentStartDate
    requiredColumns:
      - TBTreatmentStartDate
      - Sex
      - Age
      - Facility
