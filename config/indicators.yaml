        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  # ── TX_PVLS (Viral Load Suppression) — PEPFAR indicators ─────────────────

  - name: VL_SAMPLE_COLLECTED
    description: "Active patients with VL Sample Collection in current FY"
    source: CombinedRADET
    periodColumn: DateOfVLSampleCollection
    requiredColumns:
      - CurrentARTStatus
      - DateOfVLSampleCollection
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfVLSampleCollection
        operator: dateinRange
        value: CurrentFY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: PVLSN
    description: "ART patients with suppressed VL (<1,000 copies/ml) on ART >= 6 months (numerator)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentARTStatus
      - DateOfVLSampleCollection
      - DateOfCurrentViralLoad
      - CurrentViralLoad
      - DateOfCurrentVLResultSample
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: CurrentViralLoad
        operator: lessThan
        value: 1000
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
        value: ">= 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: PVLSD
    description: "ART patients with documented VL result in FY on ART >= 6 months (denominator)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentViralLoad
      - DateOfCurrentVLResultSample
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
        value: ">= 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

