# Formula-based indicators (calculated from other indicators)
formulaIndicators:

  - name: LINKAGE_RATE
    description: "Proportion of HTS positive who were linked to ART"
    numerator: TX_NEW
    denominator: HTS_TST_POS
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: TX_New_TPT_Gap
    description: "New ART TB-negative patients who have not yet started TPT"
    numerator: TX_New_Started_TP
    denominator: TTX_NEW
    formula: "numerator - denominator"
    outputType: count
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: TB_TX_GAP
    description: "Gap between TB positive results returned and treatment started"
    numerator: TB_RESULTS_RETURNED
    denominator: TB_TX_STARTED
    formula: "numerator - denominator"
    outputType: count
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: Suppression_Rate
    description: "Proportion of patients with VL results who are virally suppressed (< 1000 copies/mL)"
    numerator: VL_Suppressed
    denominator: VL_Result_Received
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: VL_Coverage
    description: "Proportion of eligible patients who received a viral load sample collection"
    numerator: VLSC
    denominator: Eligible_For_VLSC
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State