      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Stopped Treatment"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Transferred_out 
    description: "Total Transferred Out in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Transferred Out"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Invalid_Outcome
    description: "Total Invalid Outcome in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Biometric Naive"
          - "Invalid"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_lt3months_refill
    description: "IIT by months of refill less than 3 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastPickupDate
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_3to5months_refill
    description: "IIT by months of refill between 3 and 5 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 150"
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_gtr6months_refill
    description: "IIT by months of refill greaterequalto than 6 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_lt3months_refill
    description: "Transfer Out by months of refill less than 3 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastPickupDate
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_3to5months_refill
    description: "Transfer Out by months of refill between 3 and 5 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 150"
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_gtr6months_refill
    description: "Transfer Out by months of refill greaterequalto than 6 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Expected for Refill
    description: "Patients expected for ART refill (LastPickupDate + MonthsOfARVRefill)"
    source: CombinedRADET
    computedColumns:
      - name: ExpectedRefillDate
        formula: dateAdd
        sourceColumn: LastPickupDate
        addColumn: MonthsOfARVRefill
        unit: month
    periodColumn: ExpectedRefillDate
    requiredColumns:
      - LastPickupDate
      - MonthsOfARVRefill
      - ARTStartDate
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: ExpectedRefillDate
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Refilled from Expected
    description: "Active patients who actually picked up ARVs on the target date"
    source: CombinedRADET
    periodColumn: LastPickupDate
    requiredColumns:
      - LastPickupDate
      - MonthsOfARVRefill
      - ARTStartDate
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: LastPickupDate
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  # ── TX_PVLS (Viral Load Suppression) — PEPFAR indicators ─────────────────

  - name: VL_Sample_Collected
    description: "Active patients with VL Sample Collection in current FY"
    source: CombinedRADET
    periodColumn: DateOfVLSampleCollection
    requiredColumns:
      - CurrentARTStatus
      - DateOfVLSampleCollection
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfVLSampleCollection
        operator: dateinRange
        value: CurrentFY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: PVLSN
    description: "ART patients with suppressed VL (<1,000 copies/ml) on ART >= 6 months (numerator)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentARTStatus
      - DateOfVLSampleCollection
      - DateOfCurrentViralLoad
      - CurrentViralLoad
      - DateOfCurrentVLResultSample
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: CurrentViralLoad
        operator: lessThan
        value: 1000
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
        value: ">= 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: VL Result Received_PVLSD
    description: "ART patients with documented VL result in FY on ART >= 6 months (denominator)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentViralLoad
      - DateOfCurrentVLResultSample
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
        value: ">= 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: VL_Sample_Collected_Pregnant_Women
    description: "Active pregnant/breastfeeding women with VL Sample Collection in FY"
    source: CombinedRADET
    periodColumn: DateOfVLSampleCollection
    requiredColumns:
      - CurrentARTStatus
      - DateOfVLSampleCollection
      - PregnancyStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfVLSampleCollection
        operator: dateinRange
        value: CurrentFY
      - column: PregnancyStatus
        operator: inList
        value:
          - "Pregnant"
          - "Breastfeeding"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: PVLSN_pregnant_Women
    description: "Pregnant/breastfeeding ART patients with suppressed VL (<1,000 copies/ml)"
    source: CombinedRADET
    periodColumn: DateOfCurrentViralLoad
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentViralLoad
      - CurrentViralLoad
      - DateOfCurrentVLResultSample
      - ARTStartDate
      - PregnancyStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: PregnancyStatus
        operator: inList
        value:
          - "Pregnant"
          - "Breastfeeding"
        caseSensitive: false
      - column: CurrentViralLoad
        operator: lessThan
        value: 1000
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
