      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
      - column: ARTStartDate
