      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_NEW
    description: "Death Among Newly initiated on ART (excluding transfers)"
    source: Sheet1
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: ARTStartDate
        operator: dateinRange
        value: CurrentFY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_CURR
