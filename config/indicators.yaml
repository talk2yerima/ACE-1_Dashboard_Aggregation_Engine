      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
        caseSensitive: false
      - column: CurrentViralLoad
        operator: lessThan
        value: 1000
      - column: DateOfCurrentViralLoad
        operator: dateinRange
        value: CurrentFY
      - column: DateOfCurrentVLResultSample
        operator: dateDiff
        ref: ARTStartDate
        value: ">= 180"
    groupBy:
