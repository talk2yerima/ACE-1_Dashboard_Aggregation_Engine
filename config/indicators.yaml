# RADET Dashboard Indicators Configuration
# Column names match sheetHeaders.yaml positional mappings.

indicators:

  - name: HTS_TST_POS
    description: "Number of individuals who tested HIV positive"
    source: CombinedHTS
    periodColumn: DateOfHIVTesting
    requiredColumns:
      - FinalHIVTestResult
      - DateOfHIVTesting
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: FinalHIVTestResult
        operator: equals
        value: "Positive"
      - column: DateOfHIVTesting
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: HTS_TST
    description: "Number of individuals who are tested for HIV"
    source: CombinedHTS
    periodColumn: DateOfHIVTesting
    requiredColumns:
      - FinalHIVTestResult
      - DateOfHIVTesting
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: DateOfHIVTesting
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Newly_Enrolled
    description: "Newly enrolled patients on ART"
    source: CombinedRADET
    periodColumn: EnrollmentDate
    requiredColumns:
      - EnrollmentDate
      - Sex
      - Age
      - ARTEnrollmentSetting
      - Facility
      - DATIMCode
      - State
    filters:
      - column: EnrollmentDate
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - ARTEnrollmentSetting
    aggregation: COUNT
    disaggregation: Sex

  - name: TX_New
    description: "Newly initiated on ART (excluding transfers)"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: TX_New_TB_Negative
    description: "New ART patients (non-transfer) who were TB-screened and found negative"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - TBStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: TBStatus
        operator: equals
        value: "Not a TB Case"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TX_New_Started_TPT
    description: "New ART patients (non-transfer) who started TB Preventive Therapy"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - DateOfTPTStart
      - TPTType
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: DateOfTPTStart
        operator: isNotNull
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - TPTType
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_Scrn_Care_New
    description: "New patients enrolled in HIV care (ART started and TB screened)"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - DateOfTBScreening
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfTBScreening
        operator: dateMode
        value: DAILY
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Care New_Presumptive_TB
    description: "New ART patients (non-transfer) with Presumptive TB"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - TBStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: TBStatus
        operator: equals
        value: "Presumptive TB"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_Sample_Collected
    description: "Active patients with presumptive TB who had sample collected"
    source: CombinedRADET
    periodColumn: DateOfTBSampleCollection
    requiredColumns:
      - CurrentARTStatus
      - TBStatus
      - DateOfTBSampleCollection
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: inList
        value: 
          - "Active"
          - "Active Restart"
        caseSensitive: false
      - column: TBStatus
        operator: inList
        value:
          - "Presumptive TB"
      - column: DateOfTBSampleCollection
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_Results_Returned
    description: "TB results returned to patients"
    source: CombinedRADET
    periodColumn: DateOfTBResultReturn
    requiredColumns:
      - DateOfTBResultReturn
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfTBResultReturn
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_TX_Started
    description: "TB patients who started treatment"
    source: CombinedRADET
    periodColumn: TBTreatmentStartDate
    requiredColumns:
      - TBTreatmentStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: TBTreatmentStartDate
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_ACTIVE_INIT_TREAT_NEW_CARE
    description: "Number of PLHIV on ART with active TB disease who initiated TB treatment (New Care)"
    source: CombinedRADET
    periodColumn: TBTreatmentStartDate
    requiredColumns:
      - TBTreatmentStartDate
      - EnrollmentDate
      - TBType
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: TBTreatmentStartDate
        operator: isNotNull
      - column: EnrollmentDate
        operator: equalsColumn
        valueColumn: TBTreatmentStartDate
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_ACTIVE_INIT_TREAT_CLINIC_ENCOUNTER
    description: "Number of PLHIV on ART with active TB disease who initiated TB treatment (Clinic Encounter)"
    source: CombinedRADET
    periodColumn: TBTreatmentStartDate
    requiredColumns:
      - TBTreatmentStartDate
      - ARTStartDate
      - TBType
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
      - column: TBTreatmentStartDate
        operator: isNotNull
      - column: ARTStartDate
        operator: notEqualsColumn
        valueColumn: TBTreatmentStartDate
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_NEW
    description: "Death Among Newly initiated on ART (excluding transfers)"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: ARTStartDate
        operator: dateinRange
        value: CurrentFY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_CURR
    description: "Death Among Active on ART (excluding TX_New)"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - ARTStartDate
      - CareEntryPoint
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
      - column: ARTStartDate
        operator: dateNotInRange
        value: CurrentFY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Death
    description: "Total death in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_TX_ML
    description: "Total TX_ML in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Died"
          - "IIT"
          - "Transferred Out"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_IIT
    description: "Total IIT in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:  
          - "IIT"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Stopped_treatment 
    description: "Total Stopped Treatment in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
