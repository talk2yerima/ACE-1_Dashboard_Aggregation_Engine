# RADET Dashboard Indicators Configuration
# Column names match sheetHeaders.yaml positional mappings.

indicators:

  - name: HTS_TST_POS
    description: "Number of individuals who tested HIV positive"
    source: CombinedHTS
    periodColumn: DateOfHIVTesting
    requiredColumns:
      - FinalHIVTestResult
      - DateOfHIVTesting
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: FinalHIVTestResult
        operator: equals
        value: "Positive"
      - column: DateOfHIVTesting
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: NEWLY_ENROLLED
    description: "Newly enrolled patients on ART"
    source: CombinedRADET
    periodColumn: EnrollmentDate
    requiredColumns:
      - EnrollmentDate
      - Sex
      - Age
      - ARTEnrollmentSetting
      - Facility
      - DATIMCode
      - State
    filters:
      - column: EnrollmentDate
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - ARTEnrollmentSetting
    aggregation: COUNT
    disaggregation: Sex

  - name: TX_NEW
    description: "Newly initiated on ART (excluding transfers)"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_SCRN_CARE_NEW
    description: "New patients enrolled in HIV care (ART started and TB screened same day)"
    source: CombinedRADET
    periodColumn: ARTStartDate
    requiredColumns:
      - DateOfTBScreening
      - ARTStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfTBScreening
        operator: dateMode
        value: DAILY
      - column: ARTStartDate
        operator: dateMode
        value: DAILY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: CARE_NEW_PRESUMPTIVE
    description: "Active patients with presumptive TB screened today"
    source: CombinedRADET
    periodColumn: DateOfTBScreening
    requiredColumns:
      - CurrentARTStatus
      - TBStatus
      - DateOfTBScreening
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
        caseSensitive: false
      - column: TBStatus
        operator: inList
        value:
          - "Presumptive TB"
          - "Presumptive"
          - "TB/HIV co-infected"
          - "TB suspect"
      - column: DateOfTBScreening
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_SAMPLE_COLLECTED
    description: "Active patients with presumptive TB who had sample collected"
    source: CombinedRADET
    periodColumn: DateOfTBSampleCollection
    requiredColumns:
      - CurrentARTStatus
      - TBStatus
      - DateOfTBSampleCollection
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: CurrentARTStatus
        operator: equals
        value: "Active"
        caseSensitive: false
      - column: TBStatus
        operator: inList
        value:
          - "Presumptive TB"
          - "Presumptive"
          - "TB/HIV co-infected"
          - "TB suspect"
      - column: DateOfTBSampleCollection
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_RESULTS_RETURNED
    description: "TB results returned to patients"
    source: CombinedRADET
    periodColumn: DateOfTBResultReturn
    requiredColumns:
      - DateOfTBResultReturn
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfTBResultReturn
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: TB_TX_STARTED
    description: "TB patients who started treatment"
    source: CombinedRADET
    periodColumn: TBTreatmentStartDate
    requiredColumns:
      - TBTreatmentStartDate
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: TBTreatmentStartDate
        operator: dateMode
        value: TODAY
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_NEW
    description: "Death Among Newly initiated on ART (excluding transfers)"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - ARTStartDate
      - CareEntryPoint
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: ARTStartDate
        operator: dateinRange
        value: CurrentFY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: Death_by_TX_CURR
    description: "Death Among Active on ART (excluding TX_New)"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - ARTStartDate
      - CareEntryPoint
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
      - column: ARTStartDate
        operator: dateNotInRange
        value: CurrentFY
      - column: CareEntryPoint
        operator: notContains
        value: "transfer"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
      - CareEntryPoint
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Death
    description: "Total death in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Died"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_TX_ML
    description: "Total TX_ML in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Died"
          - "IIT"
          - "Transferred Out"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_IIT
    description: "Total IIT in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:  
          - "IIT"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Stopped_treatment 
    description: "Total Stopped Treatment in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Stopped Treatment"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Transferred_out 
    description: "Total Transferred Out in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Transferred Out"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Total_Invalid_Outcome
    description: "Total Invalid Outcome in FY"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: inList
        value:
          - "Biometric Naive"
          - "Invalid"
        caseSensitive: false
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_lt3months_refill
    description: "IIT by months of refill less than 3 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastPickupDate
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_3to5months_refill
    description: "IIT by months of refill between 3 and 5 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 150"
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: IIT_by_gtr6months_refill
    description: "IIT by months of refill greaterequalto than 6 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "IIT"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_lt3months_refill
    description: "Transfer Out by months of refill less than 3 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - LastPickupDate
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_3to5months_refill
    description: "Transfer Out by months of refill between 3 and 5 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "< 150"
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 90"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: Transfer_Out_by_gtr6months_refill
    description: "Transfer Out by months of refill greaterequalto than 6 months"
    source: CombinedRADET
    periodColumn: DateOfCurrentARTStatus
    requiredColumns:
      - CurrentARTStatus
      - DateOfCurrentARTStatus
      - MonthsOfARVRefill
      - Sex
      - Age
      - Facility
      - DATIMCode
      - State
    filters:
      - column: DateOfCurrentARTStatus
        operator: dateinRange
        value: CurrentFY
      - column: CurrentARTStatus
        operator: equals
        value: "Transferred Out"
        caseSensitive: false
      - column: DateOfCurrentARTStatus  
        operator: dateDiff
        ref: LastPickupDate
        value: "> 180"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: EXPECTED_FOR_REFILL
    description: "Patients expected for ART refill (LastPickupDate + MonthsOfARVRefill)"
    source: CombinedRADET
    computedColumns:
      - name: ExpectedRefillDate
        formula: dateAdd
        sourceColumn: LastPickupDate
        addColumn: MonthsOfARVRefill
        unit: month
    periodColumn: ExpectedRefillDate
    requiredColumns:
      - LastPickupDate
      - MonthsOfARVRefill
      - ARTStartDate
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: ExpectedRefillDate
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

  - name: REFILL_FROM_EXPECTED
    description: "Active patients who actually picked up ARVs on the target date"
    source: CombinedRADET
    periodColumn: LastPickupDate
    requiredColumns:
      - LastPickupDate
      - MonthsOfARVRefill
      - ARTStartDate
      - CurrentARTStatus
      - Sex
      - Age
      - DATIMCode
    filters:
      - column: LastPickupDate
        operator: dateMode
        value: DAILY
      - column: CurrentARTStatus
        operator: contains
        value: "Active"
    groupBy:
      - Facility
      - DATIMCode
      - State
      - Sex
      - AgeBand
    aggregation: COUNT
    disaggregation: Sex

# Formula-based indicators (calculated from other indicators)
formulaIndicators:

  - name: LINKAGE_RATE
    description: "Proportion of HTS positive who were linked to ART"
    numerator: TX_NEW
    denominator: HTS_TST_POS
    formula: "numerator / denominator"
    outputType: percentage
    groupBy:
      - Facility
      - DATIMCode
      - State

  - name: TB_TX_GAP
    description: "Gap between TB positive results returned and treatment started"
    numerator: TB_RESULTS_RETURNED
    denominator: TB_TX_STARTED
    formula: "numerator - denominator"
    outputType: count
    groupBy:
      - Facility
      - DATIMCode
      - State