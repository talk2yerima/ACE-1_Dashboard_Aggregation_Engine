# PEPFAR MER Official Age Bands Configuration

ageBands:
  - label: "<1"
    min: 0
    max: 0
  - label: "1-4"
    min: 1
    max: 4
  - label: "5-9"
    min: 5
    max: 9
  - label: "10-14"
    min: 10
    max: 14
  - label: "15-19"
    min: 15
    max: 19
  - label: "20-24"
    min: 20
    max: 24
  - label: "25-29"
    min: 25
    max: 29
  - label: "30-34"
    min: 30
    max: 34
  - label: "35-39"
    min: 35
    max: 39
  - label: "40-44"
    min: 40
    max: 44
  - label: "45-49"
    min: 45
    max: 49
  - label: "50+"
    min: 50
    max: 999

# Default band for unknown/invalid age
defaultBand: "Unknown"
